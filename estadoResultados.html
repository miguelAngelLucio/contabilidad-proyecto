<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-widht, initial-scale=1.0">
<title>Estado de Resultados</title>

<link rel="stylesheet" href="estadoResultados.css">

</head>

<body>

<header>

<h1>Estado de Resultados</h1>

<nav>

<a href="index.html" class="btn-inicio">
Inicio
</a>

<a href="balanceGeneral.html" class="btn-inicio">
Balance General
</a>

<a href="reporte.html" class="btn-inicio">
Reporte
</a>

<a href="estadoResultados.html" class="btn-inicio">
Estado de Resultados
</a>

</nav>

</header>

<div class="container">

<div class="gridEstados" id="gridEstados">

</div>

</div>

<!-- LIBRERÍAS -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<script>

let balances =
JSON.parse(localStorage.getItem("balances")) || [];

let grid =
document.getElementById("gridEstados");

balances.forEach((balance, index) => {

    let utilidad =

    balance.capital.utilidades || 0;

    let html = `

    <div class="tarjetaEstado" id="estado${index}">

    <h2>

    ESTADO DE RESULTADOS

    </h2>

    <h3>

    ${balance.nombre}

    </h3>

    <p class="fecha">

    ${balance.fecha}

    </p>

    <!-- DATOS -->

    <div class="seccion">

    <div class="linea">

    <span>Activos Totales</span>

    <span>

    $${balance.totales.activos.toFixed(2)}

    </span>

    </div>

    <div class="linea">

    <span>Pasivos Totales</span>

    <span>

    $${balance.totales.pasivos.toFixed(2)}

    </span>

    </div>

    <div class="linea">

    <span>Capital Contable</span>

    <span>

    $${balance.totales.capital.toFixed(2)}

    </span>

    </div>

    </div>

    <!-- UTILIDAD -->

    <div class="utilidad">

    <span>Utilidad Neta</span>

    <span>

    $${utilidad.toFixed(2)}

    </span>

    </div>

    <!-- BOTONES -->

    <div class="botones">

    <button
    class="btnExcel"
    onclick="exportarExcel(${index})"
    >

    Convertir a Excel

    </button>

    <button
    class="btnPDF"
    onclick="exportarPDF(${index})"
    >

    Convertir a PDF

    </button>

    </div>

    </div>

    `;

    grid.innerHTML += html;

});

function exportarPDF(index){

    let elemento =
    document.getElementById(
        "estado" + index
    );

    let opciones = {

        margin:0.5,

        filename:
        "Estado_Resultados.pdf",

        image:{
            type:"jpeg",
            quality:1
        },

        html2canvas:{
            scale:2
        },

        jsPDF:{
            unit:"in",
            format:"letter",
            orientation:"portrait"
        }

    };

    html2pdf()
    .set(opciones)
    .from(elemento)
    .save();

}

function exportarExcel(index){

    let balance =
    balances[index];

    let utilidad =

    balance.capital.utilidades || 0;

    let datos = [

        ["ESTADO DE RESULTADOS"],

        [],

        ["Nombre", balance.nombre],

        ["Fecha", balance.fecha],

        [],

        ["Activos Totales",
        balance.totales.activos],

        ["Pasivos Totales",
        balance.totales.pasivos],

        ["Capital Contable",
        balance.totales.capital],

        [],

        ["Utilidad Neta",
        utilidad]

    ];

    let hoja =
    XLSX.utils.aoa_to_sheet(datos);

    let libro =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        libro,
        hoja,
        "EstadoResultados"
    );

    XLSX.writeFile(
        libro,
        "Estado_Resultados.xlsx"
    );

}

</script>

</body>

</html>
